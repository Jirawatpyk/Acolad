name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run lint
      - run: npm run typecheck
      # LIVE_PORTAL is intentionally never set here (Constitution II:
      # live-portal tests must not run in CI)
      - run: npm run test:coverage
